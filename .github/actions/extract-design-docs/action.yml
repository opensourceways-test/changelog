name: 'Extract Design Documents'
description: 'Extract requirements, design documents and issue info from comments'
inputs:
  issue-number:
    description: 'Issue number'
    required: true
  github-token:
    description: 'GitHub token'
    required: true
outputs:
  has-docs:
    description: 'Whether design documents were found'
    value: ${{ steps.extract.outputs.has_docs }}
  dev-type:
    description: 'Development type'
    value: ${{ steps.extract.outputs.dev_type }}
runs:
  using: composite
  steps:
    - name: Extract design documents
      id: extract
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
      run: |
        mkdir -p /tmp/opencode
        
        python3 << 'PYTHON_SCRIPT'
        import subprocess
        import json
        
        issue_number = "${{ inputs.issue-number }}"
        
        result = subprocess.run(
            ["gh", "issue", "view", issue_number, "--json", "comments,labels,title,body"],
            capture_output=True,
            text=True
        )
        
        data = json.loads(result.stdout)
        
        req_comments = [c['body'] for c in data['comments'] 
                        if c['body'].startswith('<!-- REQUIREMENTS_DOC -->')]
        design_comments = [c['body'] for c in data['comments'] 
                          if c['body'].startswith('<!-- DESIGN_DOC -->')]
        
        with open('/tmp/opencode/requirements.md', 'w') as f:
            if req_comments:
                f.write(req_comments[-1].replace('<!-- REQUIREMENTS_DOC -->\n', '', 1))
            else:
                f.write('')
        
        with open('/tmp/opencode/design.md', 'w') as f:
            if design_comments:
                f.write(design_comments[-1].replace('<!-- DESIGN_DOC -->\n', '', 1))
            else:
                f.write('')
        
        with open('/tmp/opencode/title.txt', 'w') as f:
            f.write(data.get('title', ''))
        
        with open('/tmp/opencode/body.txt', 'w') as f:
            f.write(data.get('body', ''))
        
        labels = [l['name'] for l in data['labels']]
        dev_type = 'both'
        if 'api-only' in labels:
            dev_type = 'api-only'
        elif 'frontend-only' in labels:
            dev_type = 'frontend-only'
        
        with open('/tmp/opencode/dev_type.txt', 'w') as f:
            f.write(dev_type)
        
        has_docs = 'true' if (req_comments and design_comments) else 'false'
        print(f"has_docs={has_docs}")
        print(f"dev_type={dev_type}")
        PYTHON_SCRIPT