name: 'Fetch Issue Content'
description: 'Fetch issue title and body using GitHub CLI'
inputs:
  issue-number:
    description: 'Issue number to fetch'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: true
outputs:
  title:
    description: 'Issue title'
    value: ${{ steps.fetch.outputs.title }}
  body:
    description: 'Issue body'
    value: ${{ steps.fetch.outputs.body }}
runs:
  using: composite
  steps:
    - name: Fetch issue content
      id: fetch
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        mkdir -p /tmp/opencode
        
        gh issue view ${{ inputs.issue-number }} --json title,body,comments > /tmp/opencode/issue_data.json
        
        python3 << 'PYTHON_SCRIPT'
        import json
        
        with open('/tmp/opencode/issue_data.json') as f:
            data = json.load(f)
        
        title = data.get('title', '')
        body = data.get('body', '')
        comments = data.get('comments', [])
        
        with open('/tmp/opencode/issue.txt', 'w') as f:
            f.write(f"Issue #${{ inputs.issue-number }}: {title}\n\n{body}")
            if comments:
                f.write("\n\n--- 用户评论 ---\n")
                for c in comments:
                    f.write(f"{c.get('body', '')}\n")
        
        with open('/tmp/opencode/title.txt', 'w') as f:
            f.write(title)
        
        with open('/tmp/opencode/body.txt', 'w') as f:
            f.write(body)
        PYTHON_SCRIPT
        
        TITLE=$(cat /tmp/opencode/title.txt)
        BODY=$(cat /tmp/opencode/body.txt)
        echo "title<<EOF" >> $GITHUB_OUTPUT
        echo "$TITLE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      shell: bash