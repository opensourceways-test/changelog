name: 'Fetch Issue Content'
description: 'Fetch issue title and body using GitHub CLI'
inputs:
  issue-number:
    description: 'Issue number to fetch'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: true
outputs:
  title:
    description: 'Issue title'
    value: ${{ steps.fetch.outputs.title }}
  body:
    description: 'Issue body'
    value: ${{ steps.fetch.outputs.body }}
runs:
  using: composite
  steps:
    - name: Fetch issue content
      id: fetch
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        TITLE=$(gh issue view ${{ inputs.issue-number }} --json title -q '.title')
        BODY=$(gh issue view ${{ inputs.issue-number }} --json body -q '.body')
        COMMENTS=$(gh issue view ${{ inputs.issue-number }} --json comments -q '.[].body' || true)
        mkdir -p /tmp/opencode
        {
          printf "Issue #%s: %s\n\n%s" "${{ inputs.issue-number }}" "$TITLE" "$BODY"
          if [ -n "$COMMENTS" ]; then
            printf "\n\n--- 用户评论 ---\n%s" "$COMMENTS"
          fi
        } > /tmp/opencode/issue.txt
        echo "title<<EOF" >> $GITHUB_OUTPUT
        echo "$TITLE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
        echo "body<<EOF" >> $GITHUB_OUTPUT
        echo "$BODY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
      shell: bash