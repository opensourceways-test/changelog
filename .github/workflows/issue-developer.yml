name: Issue Developer

on:
  issues:
    types: [labeled]

concurrency:
  group: develop-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  develop:
    if: github.event.label.name == 'approved' && github.event.issue.state == 'open'
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository_owner }}/opencode-dev:latest
      env:
        HOME: /home/runner
    timeout-minutes: 60
    
    steps:
      - name: Setup opencode credentials
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          mkdir -p $HOME/.local/share/opencode/log
          mkdir -p $HOME/.config/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}\n' "$OPENCODE_API_KEY" > $HOME/.local/share/opencode/auth.json
          printf '{"$schema":"https://opencode.ai/config.json","provider":{},"agent":{},"mode":{},"command":{},"username":"runner"}\n' > $HOME/.config/opencode/opencode.json

      - name: Setup git credentials
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get issue labels and determine dev type
        id: get-type
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LABELS=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json labels -q '.labels[].name')
          
          if echo "$LABELS" | grep -q "^api-only$"; then
            echo "dev_type=api-only" >> $GITHUB_OUTPUT
            echo "needs_api=false" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "^frontend-only$"; then
            echo "dev_type=frontend-only" >> $GITHUB_OUTPUT
            echo "needs_api=false" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "^both$"; then
            echo "dev_type=both" >> $GITHUB_OUTPUT
            echo "needs_api=true" >> $GITHUB_OUTPUT
          else
            echo "dev_type=both" >> $GITHUB_OUTPUT
            echo "needs_api=true" >> $GITHUB_OUTPUT
          fi

      - name: Fetch design documents from issue comments
        id: fetch-design
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          mkdir -p /tmp/opencode
          
          gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json title,body -q '.title' > /tmp/opencode/issue_title.txt
          gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json body -q '.body' > /tmp/opencode/issue_body.txt
          
          gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json comments -q '.comments[].body' > /tmp/opencode/all_comments.txt
          
          DESIGN_DOC=""
          REQUIREMENTS_DOC=""
          
          while IFS= read -r comment; do
            if echo "$comment" | grep -q "技术方案\|实现步骤\|验收标准"; then
              DESIGN_DOC+="$comment\n\n"
            fi
            if echo "$comment" | grep -q "需求详情\|影响范围"; then
              REQUIREMENTS_DOC+="$comment\n\n"
            fi
          done < /tmp/opencode/all_comments.txt
          
          if [ -n "$DESIGN_DOC" ]; then
            printf "$DESIGN_DOC" > /tmp/opencode/design.md
            echo "has_design=true" >> $GITHUB_OUTPUT
          else
            echo "has_design=false" >> $GITHUB_OUTPUT
          fi
          
          if [ -n "$REQUIREMENTS_DOC" ]; then
            printf "$REQUIREMENTS_DOC" > /tmp/opencode/requirements.md
            echo "has_requirements=true" >> $GITHUB_OUTPUT
          else
            echo "has_requirements=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout APIMagic repository
        if: steps.get-type.outputs.dev_type == 'api-only' || steps.get-type.outputs.dev_type == 'both'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/APIMagic
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          path: APIMagic
          fetch-depth: 0

      - name: Checkout datastat-website repository
        if: steps.get-type.outputs.dev_type == 'frontend-only' || steps.get-type.outputs.dev_type == 'both'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/datastat-website
          token: ${{ secrets.CROSS_REPO_TOKEN }}
          path: datastat-website
          fetch-depth: 0

      - name: Develop API in APIMagic
        if: steps.get-type.outputs.dev_type == 'api-only' || steps.get-type.outputs.dev_type == 'both'
        id: develop-api
        working-directory: APIMagic
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          HAS_DESIGN: ${{ steps.fetch-design.outputs.has_design }}
          HAS_REQUIREMENTS: ${{ steps.fetch-design.outputs.has_requirements }}
        run: |
          BRANCH_NAME="cross-repo-issue-${ISSUE_NUMBER}-api"
          
          if git ls-remote --heads origin $BRANCH_NAME | grep -q .; then
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            git checkout -b $BRANCH_NAME
          fi
          
          git config --global --add safe.directory $GITHUB_WORKSPACE/APIMagic
          
          ISSUE_TITLE=$(cat /tmp/opencode/issue_title.txt)
          ISSUE_BODY=$(cat /tmp/opencode/issue_body.txt)
          
          DESIGN_CONTEXT=""
          if [ "$HAS_DESIGN" = "true" ] && [ -f /tmp/opencode/design.md ]; then
            DESIGN_CONTEXT="\n\n### 设计方案\n$(cat /tmp/opencode/design.md)"
          fi
          
          REQUIREMENTS_CONTEXT=""
          if [ "$HAS_REQUIREMENTS" = "true" ] && [ -f /tmp/opencode/requirements.md ]; then
            REQUIREMENTS_CONTEXT="\n\n### 需求分析\n$(cat /tmp/opencode/requirements.md)"
          fi
          
          MESSAGE="请根据以下需求和设计文档开发 API：

          Issue #${ISSUE_NUMBER}: $ISSUE_TITLE

          $ISSUE_BODY
          $REQUIREMENTS_CONTEXT$DESIGN_CONTEXT

          请严格按照设计文档的实现步骤进行开发。
          创建或修改 magic-api/api 目录下的 .ms 文件。

          完成后将 PR 描述写入 /tmp/opencode/api_pr_body.md"

          set +e
          opencode run "$MESSAGE" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          git checkout -- .github/workflows/ 2>/dev/null || true
          
          if git rev-parse --verify origin/$BRANCH_NAME >/dev/null 2>&1; then
            COMMIT_COUNT=$(git rev-list --count origin/$BRANCH_NAME..HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API tests
        if: steps.develop-api.outputs.has_changes == 'true'
        working-directory: APIMagic
        id: test-api
        run: |
          mvn test -q 2>&1 | tee /tmp/opencode/api_test_output.txt || true
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "test_passed=false" >> $GITHUB_OUTPUT
          else
            echo "test_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Insert .ms files to database
        if: steps.develop-api.outputs.has_changes == 'true' && steps.test-api.outputs.test_passed == 'true'
        working-directory: APIMagic
        env:
          DB_HOST: 10.0.0.58
          DB_PORT: 5432
          DB_NAME: onedata
          DB_USER: postgres
          DB_PASSWORD: onedata
        run: |
          if [ -d "magic-api/api" ] && [ "$(find magic-api/api -name '*.ms' | wc -l)" -gt 0 ]; then
            make insert DIR=magic-api/api TABLE=magic_api_file_prod
          fi

      - name: Push APIMagic changes
        if: steps.develop-api.outputs.has_changes == 'true' && steps.test-api.outputs.test_passed == 'true'
        working-directory: APIMagic
        env:
          BRANCH_NAME: ${{ steps.develop-api.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git add -A ':!.github/workflows/'
          git commit -m "API development for issue #${ISSUE_NUMBER}"
          git push -u origin $BRANCH_NAME

      - name: Create APIMagic PR
        if: steps.develop-api.outputs.has_changes == 'true' && steps.test-api.outputs.test_passed == 'true'
        id: create-api-pr
        working-directory: APIMagic
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          BRANCH_NAME: ${{ steps.develop-api.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -f /tmp/opencode/api_pr_body.md ] && [ -s /tmp/opencode/api_pr_body.md ]; then
            PR_BODY=$(cat /tmp/opencode/api_pr_body.md)
          else
            PR_BODY="API 开发来自 issue #${ISSUE_NUMBER}"
          fi
          
          gh pr create --title "API for issue #${ISSUE_NUMBER}" --body "$PR_BODY" --base main || true
          PR_URL=$(gh pr list --head $BRANCH_NAME --json url -q '.[0].url')
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Start API test service
        if: steps.develop-api.outputs.has_changes == 'true' && steps.test-api.outputs.test_passed == 'true' && steps.get-type.outputs.needs_api == 'true'
        id: start-api-service
        working-directory: APIMagic
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          PORT=$((9999 + ISSUE_NUMBER % 1000))
          echo "port=$PORT" >> $GITHUB_OUTPUT
          
          docker run -d \
            --name apimagic-test-$ISSUE_NUMBER \
            --network host \
            -v $GITHUB_WORKSPACE/APIMagic:/app \
            -v /tmp/m2-cache:/home/runner/.m2 \
            -w /app \
            ghcr.io/${{ github.repository_owner }}/opencode-dev:latest \
            mvn spring-boot:run -Dspring-boot.run.arguments="--server.port=$PORT --server.address=0.0.0.0"
          
          for i in {1..60}; do
            if curl -s --max-time 2 http://localhost:$PORT/ > /dev/null 2>&1; then
              echo "Service ready on port $PORT"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Service failed to start"
              docker stop apimagic-test-$ISSUE_NUMBER || true
              docker rm apimagic-test-$ISSUE_NUMBER || true
              exit 1
            fi
            sleep 2
          done

      - name: Develop frontend in datastat-website
        if: steps.get-type.outputs.dev_type == 'frontend-only' || steps.get-type.outputs.dev_type == 'both'
        id: develop-frontend
        working-directory: datastat-website
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          HAS_DESIGN: ${{ steps.fetch-design.outputs.has_design }}
          HAS_REQUIREMENTS: ${{ steps.fetch-design.outputs.has_requirements }}
          NEEDS_API: ${{ steps.get-type.outputs.needs_api }}
          API_PORT: ${{ steps.start-api-service.outputs.port }}
        run: |
          BRANCH_NAME="cross-repo-issue-${ISSUE_NUMBER}-frontend"
          
          if git ls-remote --heads origin $BRANCH_NAME | grep -q .; then
            git fetch origin $BRANCH_NAME
            git checkout $BRANCH_NAME
          else
            git checkout -b $BRANCH_NAME
          fi
          
          git config --global --add safe.directory $GITHUB_WORKSPACE/datastat-website
          
          ISSUE_TITLE=$(cat /tmp/opencode/issue_title.txt)
          ISSUE_BODY=$(cat /tmp/opencode/issue_body.txt)
          
          API_CONTEXT=""
          if [ "$NEEDS_API" = "true" ] && [ -n "$API_PORT" ]; then
            API_CONTEXT="\n\nAPI 测试服务地址: http://159.138.55.6:$API_PORT
          请在前端代码中使用此地址进行 API 调用测试。"
          fi
          
          DESIGN_CONTEXT=""
          if [ "$HAS_DESIGN" = "true" ] && [ -f /tmp/opencode/design.md ]; then
            DESIGN_CONTEXT="\n\n### 设计方案\n$(cat /tmp/opencode/design.md)"
          fi
          
          REQUIREMENTS_CONTEXT=""
          if [ "$HAS_REQUIREMENTS" = "true" ] && [ -f /tmp/opencode/requirements.md ]; then
            REQUIREMENTS_CONTEXT="\n\n### 需求分析\n$(cat /tmp/opencode/requirements.md)"
          fi
          
          MESSAGE="请根据以下需求和设计文档开发前端功能：

          Issue #${ISSUE_NUMBER}: $ISSUE_TITLE

          $ISSUE_BODY
          $REQUIREMENTS_CONTEXT$DESIGN_CONTEXT$API_CONTEXT

          请严格按照设计文档的实现步骤进行开发。

          完成后将 PR 描述写入 /tmp/opencode/frontend_pr_body.md"

          set +e
          opencode run "$MESSAGE" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          git checkout -- .github/workflows/ 2>/dev/null || true
          
          if git rev-parse --verify origin/$BRANCH_NAME >/dev/null 2>&1; then
            COMMIT_COUNT=$(git rev-list --count origin/$BRANCH_NAME..HEAD)
          else
            COMMIT_COUNT=$(git rev-list --count HEAD)
          fi
          
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run frontend tests
        if: steps.develop-frontend.outputs.has_changes == 'true'
        working-directory: datastat-website
        id: test-frontend
        run: |
          npm test 2>&1 | tee /tmp/opencode/frontend_test_output.txt || true
          TEST_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $TEST_EXIT_CODE -ne 0 ]; then
            echo "test_passed=false" >> $GITHUB_OUTPUT
          else
            echo "test_passed=true" >> $GITHUB_OUTPUT
          fi

      - name: Push datastat-website changes
        if: steps.develop-frontend.outputs.has_changes == 'true'
        working-directory: datastat-website
        env:
          BRANCH_NAME: ${{ steps.develop-frontend.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          git add -A ':!.github/workflows/'
          git commit -m "Frontend development for issue #${ISSUE_NUMBER}"
          git push -u origin $BRANCH_NAME

      - name: Create datastat-website PR
        if: steps.develop-frontend.outputs.has_changes == 'true'
        id: create-frontend-pr
        working-directory: datastat-website
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          BRANCH_NAME: ${{ steps.develop-frontend.outputs.branch_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ -f /tmp/opencode/frontend_pr_body.md ] && [ -s /tmp/opencode/frontend_pr_body.md ]; then
            PR_BODY=$(cat /tmp/opencode/frontend_pr_body.md)
          else
            PR_BODY="前端开发来自 issue #${ISSUE_NUMBER}"
          fi
          
          gh pr create --title "Frontend for issue #${ISSUE_NUMBER}" --body "$PR_BODY" --base main || true
          PR_URL=$(gh pr list --head $BRANCH_NAME --json url -q '.[0].url')
          echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT

      - name: Comment development result on issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEV_TYPE: ${{ steps.get-type.outputs.dev_type }}
          API_PR_URL: ${{ steps.create-api-pr.outputs.pr_url }}
          FRONTEND_PR_URL: ${{ steps.create-frontend-pr.outputs.pr_url }}
          API_HAS_CHANGES: ${{ steps.develop-api.outputs.has_changes }}
          FRONTEND_HAS_CHANGES: ${{ steps.develop-frontend.outputs.has_changes }}
          API_TEST_PASSED: ${{ steps.test-api.outputs.test_passed }}
          FRONTEND_TEST_PASSED: ${{ steps.test-frontend.outputs.test_passed }}
          API_PORT: ${{ steps.start-api-service.outputs.port }}
        run: |
          COMMENT="🚀 **开发完成**

          **开发类型**: $DEV_TYPE
          "
          
          if [ "$DEV_TYPE" = "api-only" ] || [ "$DEV_TYPE" = "both" ]; then
            if [ "$API_HAS_CHANGES" = "true" ] && [ "$API_TEST_PASSED" = "true" ]; then
              COMMENT+="
          - APIMagic PR: $API_PR_URL"
              if [ -n "$API_PORT" ]; then
                COMMENT+="
          - API 测试服务: http://159.138.55.6:$API_PORT"
              fi
            elif [ "$API_HAS_CHANGES" != "true" ]; then
              COMMENT+="
          - APIMagic: 未检测到代码变更"
            else
              COMMENT+="
          - APIMagic: 测试失败"
            fi
          fi
          
          if [ "$DEV_TYPE" = "frontend-only" ] || [ "$DEV_TYPE" = "both" ]; then
            if [ "$FRONTEND_HAS_CHANGES" = "true" ] && [ "$FRONTEND_TEST_PASSED" = "true" ]; then
              COMMENT+="
          - datastat-website PR: $FRONTEND_PR_URL"
            elif [ "$FRONTEND_HAS_CHANGES" != "true" ]; then
              COMMENT+="
          - datastat-website: 未检测到代码变更"
            else
              COMMENT+="
          - datastat-website: 测试失败"
            fi
          fi
          
          gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "$COMMENT"

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/opencode || true
          docker stop apimagic-test-${{ github.event.issue.number }} || true
          docker rm apimagic-test-${{ github.event.issue.number }} || true