name: Issue Developer

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: issue-developer-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  pull-requests: write

jobs:
  develop:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'approved' && github.event.issue.state == 'open') ||
      (github.event_name == 'issue_comment' && github.event.issue.state == 'open' && contains(github.event.comment.body, '/develop'))
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository_owner }}/opencode-dev:latest
      env:
        HOME: /home/runner
    timeout-minutes: 30
    
    steps:
      - name: Checkout changelog
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        shell: bash

      - name: Pre-cleanup workspace
        run: |
          sudo rm -rf $GITHUB_WORKSPACE/APIMagic $GITHUB_WORKSPACE/datastat-website 2>/dev/null || true
        shell: bash

      - name: Fetch issue
        uses: ./.github/actions/fetch-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ github.token }}

      - name: Extract design documents
        id: extract
        uses: ./.github/actions/extract-design-docs
        with:
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ github.token }}

      - name: Parse develop command
        id: parse-cmd
        if: github.event_name == 'issue_comment'
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          DEV_TYPE_LABEL: ${{ steps.extract.outputs.dev-type }}
        run: |
          if echo "$COMMENT_BODY" | grep -qi '/develop api'; then
            echo "dev_type=api-only" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_BODY" | grep -qi '/develop frontend'; then
            echo "dev_type=frontend-only" >> $GITHUB_OUTPUT
          elif echo "$COMMENT_BODY" | grep -qi '/develop both'; then
            echo "dev_type=both" >> $GITHUB_OUTPUT
          else
            echo "dev_type=$DEV_TYPE_LABEL" >> $GITHUB_OUTPUT
          fi

      - name: Determine final dev type
        id: final-type
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "dev_type=${{ steps.parse-cmd.outputs.dev_type }}" >> $GITHUB_OUTPUT
          else
            echo "dev_type=${{ steps.extract.outputs.dev-type }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target repos
        uses: ./.github/actions/checkout-repos
        with:
          dev-type: ${{ steps.final-type.outputs.dev_type }}
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository-owner: ${{ github.repository_owner }}

      - name: Develop API
        if: steps.final-type.outputs.dev_type == 'api-only' || steps.final-type.outputs.dev_type == 'both'
        id: api
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DB_HOST: 10.0.0.58
        run: |
          BRANCH="changelog-issue-$ISSUE_NUMBER"
          cd APIMagic
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          git fetch origin $BRANCH 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH; then
            git checkout -f $BRANCH
            git pull origin $BRANCH --rebase || git pull origin $BRANCH
          else
            git checkout -f -b $BRANCH
          fi
          git config --global --add safe.directory $GITHUB_WORKSPACE/APIMagic
          
          DESIGN=$(cat /tmp/opencode/design.md 2>/dev/null || echo "")
          REQ=$(cat /tmp/opencode/requirements.md 2>/dev/null || echo "")
          ISSUE_CONTENT=$(cat /tmp/opencode/issue.txt 2>/dev/null || echo "")
          
          [ -n "$DESIGN" ] && [ -n "$REQ" ] && opencode run "根据设计文档开发/调整 API：

          Issue 内容（包含用户评论）：
          $ISSUE_CONTENT
          
          设计方案: $DESIGN
          需求分析: $REQ

          要求：
          1. 参考 CLAUDE.md 和现有 .ms 文件格式
          2. 如用户评论中有修改意见，基于已有代码进行调整
          3. 创建/修改 magic-api/api/ 下的接口文件" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false || true
          
          git checkout -- .github/workflows/ 2>/dev/null || true
          make insert 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "API for issue #$ISSUE_NUMBER"
            git push -u origin $BRANCH
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Develop Frontend
        if: steps.final-type.outputs.dev_type == 'frontend-only' || steps.final-type.outputs.dev_type == 'both'
        id: frontend
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          BRANCH="changelog-issue-$ISSUE_NUMBER"
          cd datastat-website
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          git fetch origin $BRANCH 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH; then
            git checkout -f $BRANCH
            git pull origin $BRANCH --rebase || git pull origin $BRANCH
          else
            git checkout -f -b $BRANCH
          fi
          git config --global --add safe.directory $GITHUB_WORKSPACE/datastat-website
          
          DESIGN=$(cat /tmp/opencode/design.md 2>/dev/null || echo "")
          REQ=$(cat /tmp/opencode/requirements.md 2>/dev/null || echo "")
          ISSUE_CONTENT=$(cat /tmp/opencode/issue.txt 2>/dev/null || echo "")
          
          [ -n "$DESIGN" ] && [ -n "$REQ" ] && opencode run "根据设计文档开发/调整前端：

          Issue 内容（包含用户评论）：
          $ISSUE_CONTENT
          
          设计方案: $DESIGN
          需求分析: $REQ

          要求：
          1. 参考 CLAUDE.md 目录结构
          2. 如用户评论中有修改意见，基于已有代码进行调整
          3. 修改对应的 Vue 组件" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false || true
          
          git checkout -- .github/workflows/ 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Frontend for issue #$ISSUE_NUMBER"
            git push -u origin $BRANCH
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Create PRs
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEV_TYPE: ${{ steps.extract.outputs.dev-type }}
          API_HAS: ${{ steps.api.outputs.has_changes }}
          FRONTEND_HAS: ${{ steps.frontend.outputs.has_changes }}
          REPO_OWNER: ${{ github.repository_owner }}
          BRANCH: changelog-issue-${{ github.event.issue.number }}
        run: |
          NL=$'\n'
          RESULT=""
          
          PR_BODY_TEMPLATE="## 描述${NL}来自 changelog issue #${ISSUE_NUMBER}${NL}${NL}## 相关 Issue${NL}resolve https://github.com/${REPO_OWNER}/changelog/issues/${ISSUE_NUMBER}${NL}${NL}## 变更类型${NL}- [ ] Bug 修复${NL}- [ ] 新功能${NL}- [ ] 代码重构${NL}- [ ] 文档更新${NL}- [ ] 样式改进${NL}- [ ] 性能优化${NL}- [ ] 测试相关${NL}- [ ] 其他"
          
          if [ "$DEV_TYPE" = "api-only" ] || [ "$DEV_TYPE" = "both" ]; then
            if [ "$API_HAS" = "true" ]; then
              cd APIMagic
              EXISTING_PR=$(gh pr list --head $BRANCH --state open --json number,url -q '.[0].url' 2>/dev/null || echo "")
              if [ -n "$EXISTING_PR" ]; then
                PR="$EXISTING_PR"
                echo "PR already exists: $PR"
              else
                PR=$(gh pr create --title "Implement issue #${ISSUE_NUMBER}" --body "$PR_BODY_TEMPLATE" --base main)
              fi
              cd ..
              RESULT="${RESULT}APIMagic PR: $PR${NL}"
            else
              RESULT="${RESULT}APIMagic: 无变更${NL}"
            fi
          fi
          if [ "$DEV_TYPE" = "frontend-only" ] || [ "$DEV_TYPE" = "both" ]; then
            if [ "$FRONTEND_HAS" = "true" ]; then
              cd datastat-website
              EXISTING_PR=$(gh pr list --head $BRANCH --state open --json number,url -q '.[0].url' 2>/dev/null || echo "")
              if [ -n "$EXISTING_PR" ]; then
                PR="$EXISTING_PR"
                PR_NUM=$(gh pr list --head $BRANCH --state open --json number -q '.[0].number')
                echo "PR already exists: $PR"
              else
                PR=$(gh pr create --title "Implement issue #${ISSUE_NUMBER}" --body "$PR_BODY_TEMPLATE" --base main)
                PR_NUM=$(echo "$PR" | grep -oP 'pull/\K[0-9]+')
              fi
              DATASTAT_PORT=$((20000 + PR_NUM))
              cd ..
              RESULT="${RESULT}datastat-website PR: $PR${NL}"
              RESULT="${RESULT}datastat-website 测试: http://159.138.55.6:$DATASTAT_PORT${NL}"
            else
              RESULT="${RESULT}datastat-website: 无变更${NL}"
            fi
          fi
          gh issue comment $ISSUE_NUMBER --body "🚀 **开发完成**${NL}${NL}${RESULT}${NL}**APIMagic 测试服务**：${NL}- API: http://159.138.55.6:9999${NL}- MagicAPI UI: http://159.138.55.6:9999/magic/web/index.html${NL}${NL}> PR 创建后会自动触发测试服务启动"
        shell: bash