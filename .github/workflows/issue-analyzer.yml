name: Issue Analyzer

on:
  issues:
    types: [labeled]

concurrency:
  group: analyze-issue-${{ github.event.issue.number }}
  cancel-in-progress: true

permissions:
  issues: write
  contents: read

jobs:
  analyze-issue:
    if: github.event.label.name == 'accept' && github.event.issue.state == 'open'
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository_owner }}/opencode-dev:latest
      env:
        HOME: /home/runner
    timeout-minutes: 30
    outputs:
      dev_type: ${{ steps.parse-result.outputs.dev_type }}
    
    steps:
      - name: Setup opencode credentials
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          mkdir -p $HOME/.local/share/opencode/log
          mkdir -p $HOME/.config/opencode
          printf '{"alibaba-cn":{"type":"api","key":"%s"}}\n' "$OPENCODE_API_KEY" > $HOME/.local/share/opencode/auth.json
          printf '{"$schema":"https://opencode.ai/config.json","provider":{},"agent":{},"mode":{},"command":{},"username":"runner"}\n' > $HOME/.config/opencode/opencode.json

      - name: Prepare issue data
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/opencode
          
          ISSUE_TITLE=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json title -q '.title')
          ISSUE_BODY=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json body -q '.body')
          
          cat > /tmp/opencode/issue_context.txt << EOF
          Issue #${{ env.ISSUE_NUMBER }}: $ISSUE_TITLE
          
          $ISSUE_BODY
          EOF

      - name: Run opencode to analyze issue
        id: analyze
        run: |
          MESSAGE="请根据以下 GitHub Issue 进行需求和设计分析：

          Issue 内容：
          $(cat /tmp/opencode/issue_context.txt)

          请执行以下操作：
          1. 将需求分析报告写入 /tmp/opencode/requirements.md，包含：Issue 概述、需求详情、影响范围
          2. 将设计方案文档写入 /tmp/opencode/design.md，包含：技术方案、实现步骤、验收标准
          3. 判断需要开发哪些仓库，将结果写入 /tmp/opencode/dev_type.txt（只写一行：api-only/frontend-only/both）

          文件格式要求：
          - 使用标准 Markdown 格式
          - 每个文件以一级标题开始"

          set +e
          opencode run "$MESSAGE" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false
          EXIT_CODE=$?
          set -e
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

      - name: Parse analysis result
        id: parse-result
        run: |
          if [ -f /tmp/opencode/dev_type.txt ] && [ -s /tmp/opencode/dev_type.txt ]; then
            DEV_TYPE=$(head -1 /tmp/opencode/dev_type.txt)
            
            case "$DEV_TYPE" in
              api-only|frontend-only|both)
                echo "dev_type=$DEV_TYPE" >> $GITHUB_OUTPUT
                ;;
              *)
                echo "dev_type=both" >> $GITHUB_OUTPUT
                ;;
            esac
          else
            echo "dev_type=both" >> $GITHUB_OUTPUT
          fi

      - name: Add dev_type label to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEV_TYPE: ${{ steps.parse-result.outputs.dev_type }}
        run: |
          gh issue edit $ISSUE_NUMBER -R ${{ github.repository }} --add-label "$DEV_TYPE"

      - name: Post analysis result to issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEV_TYPE: ${{ steps.parse-result.outputs.dev_type }}
          EXIT_CODE: ${{ steps.analyze.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            COMMENT="⚠️ **AI 分析出错** (Exit code: $EXIT_CODE)

          请检查并重新触发。"
            gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "$COMMENT"
          else
            gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "✅ **需求分析完成**

          **开发类型**: $DEV_TYPE

          请审核设计文档后添加 \`approved\` 标签触发开发。"
            
            if [ -f /tmp/opencode/requirements.md ] && [ -s /tmp/opencode/requirements.md ]; then
              gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "$(cat /tmp/opencode/requirements.md)"
            fi
            
            if [ -f /tmp/opencode/design.md ] && [ -s /tmp/opencode/design.md ]; then
              gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "$(cat /tmp/opencode/design.md)"
            fi
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/opencode || true

  trigger-development:
    if: github.event.label.name == 'approved' && github.event.issue.state == 'open'
    runs-on: self-hosted
    needs: []
    
    steps:
      - name: Get issue labels
        id: get-labels
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          LABELS=$(gh issue view $ISSUE_NUMBER -R ${{ github.repository }} --json labels -q '.labels[].name')
          
          if echo "$LABELS" | grep -q "^api-only$"; then
            echo "dev_type=api-only" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "^frontend-only$"; then
            echo "dev_type=frontend-only" >> $GITHUB_OUTPUT
          elif echo "$LABELS" | grep -q "^both$"; then
            echo "dev_type=both" >> $GITHUB_OUTPUT
          else
            echo "dev_type=both" >> $GITHUB_OUTPUT
          fi

      - name: Trigger APIMagic repository
        if: steps.get-labels.outputs.dev_type == 'api-only' || steps.get-labels.outputs.dev_type == 'both'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          APIMAGIC_REPO: ${{ github.repository_owner }}/APIMagic
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          CHANGELOG_REPO: ${{ github.repository }}
        run: |
          gh api repos/$APIMAGIC_REPO/dispatches \
            -f event_type='start-api-dev' \
            -f 'client_payload[issue_number]'="$ISSUE_NUMBER" \
            -f 'client_payload[issue_title]'="$ISSUE_TITLE" \
            -f 'client_payload[issue_body]'="$ISSUE_BODY" \
            -f 'client_payload[source_repo]'="$CHANGELOG_REPO"

      - name: Trigger datastat-website repository
        if: steps.get-labels.outputs.dev_type == 'frontend-only' || steps.get-labels.outputs.dev_type == 'both'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          DATASTAT_WEBSITE_REPO: ${{ github.repository_owner }}/datastat-website
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          CHANGELOG_REPO: ${{ github.repository }}
          DEV_TYPE: ${{ steps.get-labels.outputs.dev_type }}
        run: |
          NEEDS_API=$([ "$DEV_TYPE" = "both" ] && echo "true" || echo "false")
          gh api repos/$DATASTAT_WEBSITE_REPO/dispatches \
            -f event_type='start-frontend-dev' \
            -f 'client_payload[issue_number]'="$ISSUE_NUMBER" \
            -f 'client_payload[issue_title]'="$ISSUE_TITLE" \
            -f 'client_payload[issue_body]'="$ISSUE_BODY" \
            -f 'client_payload[source_repo]'="$CHANGELOG_REPO" \
            -F 'client_payload[needs_api]'="$NEEDS_API"

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEV_TYPE: ${{ steps.get-labels.outputs.dev_type }}
        run: |
          gh issue comment $ISSUE_NUMBER -R ${{ github.repository }} --body "🚀 **已触发开发**

          **开发类型**: $DEV_TYPE

          目标仓库已开始自动开发。"