name: Issue Analyzer

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

concurrency:
  group: issue-analyzer-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'accept' && github.event.issue.state == 'open') ||
      (github.event_name == 'issue_comment' && github.event.issue.state == 'open' && contains(github.event.comment.body, '/reanalyze'))
    runs-on: self-hosted
    container:
      image: ghcr.io/${{ github.repository_owner }}/opencode-dev:latest
      env:
        HOME: /home/runner
    timeout-minutes: 10
    
    steps:
      - name: Checkout changelog
        uses: actions/checkout@v4

      - name: Setup
        uses: ./.github/actions/setup
        with:
          opencode-api-key: ${{ secrets.OPENCODE_API_KEY }}

      - name: Fetch issue
        uses: ./.github/actions/fetch-issue
        with:
          issue-number: ${{ github.event.issue.number }}
          github-token: ${{ github.token }}

      - name: Determine dev type
        id: dev-type
        shell: bash
        run: |
          opencode run "判断以下 Issue 需要开发哪些仓库（只写一行：api-only/frontend-only/both）：

          $(cat /tmp/opencode/issue.txt)" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false > /tmp/opencode/dev_type.txt || true
          [ -s /tmp/opencode/dev_type.txt ] || echo "both" > /tmp/opencode/dev_type.txt

      - name: Parse dev type
        id: parse
        shell: bash
        run: |
          DEV_TYPE=$(head -1 /tmp/opencode/dev_type.txt 2>/dev/null || echo "both")
          case "$DEV_TYPE" in api-only|frontend-only|both) ;; *) DEV_TYPE="both";; esac
          echo "dev_type=$DEV_TYPE" >> $GITHUB_OUTPUT

      - name: Checkout target repos
        uses: ./.github/actions/checkout-repos
        with:
          dev-type: ${{ steps.parse.outputs.dev_type }}
          cross-repo-token: ${{ secrets.CROSS_REPO_TOKEN }}
          repository-owner: ${{ github.repository_owner }}

      - name: Generate design documents
        id: design
        shell: bash
        env:
          DEV_TYPE: ${{ steps.parse.outputs.dev_type }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          REPO_PATH=""
          if [ "$DEV_TYPE" = "api-only" ] || [ "$DEV_TYPE" = "both" ]; then
            REPO_PATH+="APIMagic "
          fi
          if [ "$DEV_TYPE" = "frontend-only" ] || [ "$DEV_TYPE" = "both" ]; then
            REPO_PATH+="datastat-website "
          fi
          
          opencode run "根据 Issue 和 CLAUDE.md 生成设计文档：

          Issue: $(cat /tmp/opencode/issue.txt)

          目标仓库: $REPO_PATH

          要求：
          1. 先读取各仓库的 CLAUDE.md 了解项目结构
          2. 写入 /tmp/opencode/requirements.md（需求分析）
          3. 写入 /tmp/opencode/design.md（设计方案，含具体文件路径和代码示例）" --model alibaba-cn/glm-5 --agent build --dangerously-skip-permissions --thinking=false || true

      - name: Add dev_type label
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEV_TYPE: ${{ steps.parse.outputs.dev_type }}
        run: gh issue edit $ISSUE_NUMBER --add-label "$DEV_TYPE"

      - name: Comment design documents
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          DEV_TYPE: ${{ steps.parse.outputs.dev_type }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "✅ **需求分析完成** (开发类型: $DEV_TYPE)
          
          请审核后添加 \`approved\` 标签触发开发。"
          
          if [ -f /tmp/opencode/requirements.md ]; then
            echo '<!-- REQUIREMENTS_DOC -->' > /tmp/body.txt
            cat /tmp/opencode/requirements.md >> /tmp/body.txt
            gh issue comment $ISSUE_NUMBER --body-file /tmp/body.txt
          fi
          
          if [ -f /tmp/opencode/design.md ]; then
            echo '<!-- DESIGN_DOC -->' > /tmp/body.txt
            cat /tmp/opencode/design.md >> /tmp/body.txt
            gh issue comment $ISSUE_NUMBER --body-file /tmp/body.txt
          fi